<a routerLink="/" class="logo-wrap" [class.dark]="theme === 'dark'" [class.size-sm]="size === 'sm'" [class.size-lg]="size === 'lg'">

  <!-- ── Icon mark ── -->
  <div class="logo-icon">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Rounded square background -->
      <rect width="44" height="44" rx="10" fill="#0A52CC"/>
      <!-- Inner glow layer -->
      <rect width="44" height="44" rx="10" fill="url(#iconGlow)" opacity="0.35"/>

      <!-- Circuit-board S mark (3 bars + 2 connectors) -->
      <!-- Top bar -->
      <rect x="10" y="10" width="24" height="4.5" rx="2.25" fill="white"/>
      <!-- Right connector (top→mid) -->
      <rect x="29.5" y="14.5" width="4.5" height="6" rx="0" fill="white"/>
      <!-- Middle bar -->
      <rect x="10" y="20.5" width="24" height="4.5" rx="2.25" fill="white"/>
      <!-- Left connector (mid→bottom) -->
      <rect x="10" y="25" width="4.5" height="6" rx="0" fill="white"/>
      <!-- Bottom bar -->
      <rect x="10" y="30" width="24" height="4.5" rx="2.25" fill="white"/>

      <!-- Tech accent dots -->
      <circle cx="10" cy="10" r="2" fill="#60A5FA" opacity="0.9"/>
      <circle cx="34" cy="34.5" r="2" fill="#60A5FA" opacity="0.9"/>

      <defs>
        <linearGradient id="iconGlow" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="white"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- ── Wordmark ── -->
  <div class="logo-text">
    <span class="logo-name">SPECTER</span>
    <span class="logo-sub">Technologies Ltd.</span>
  </div>

</a>
