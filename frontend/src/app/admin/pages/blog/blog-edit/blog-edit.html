<div class="edit-page">
  <div class="edit-header">
    <a routerLink="/admin/blog" class="back-btn">← Back</a>
    <h1>{{ isEdit ? 'Edit Blog Post' : 'New Blog Post' }}</h1>
  </div>

  @if (loading()) {
    <div class="loading-box">Loading...</div>
  } @else {
    @if (error()) { <div class="alert-error">{{ error() }}</div> }
    @if (success()) { <div class="alert-success">{{ success() }}</div> }

    <div class="edit-grid">
      <!-- Main content -->
      <div class="edit-main">
        <div class="form-card">
          <div class="form-group">
            <label>Title *</label>
            <input [(ngModel)]="form.title" (blur)="generateSlug()" placeholder="Enter post title..." />
          </div>
          <div class="form-group">
            <label>Slug</label>
            <input [(ngModel)]="form.slug" placeholder="auto-generated-from-title" />
          </div>
          <div class="form-group">
            <label>Excerpt</label>
            <textarea [(ngModel)]="form.excerpt" rows="3" placeholder="Short summary shown in listing pages..."></textarea>
          </div>
          <div class="form-group">
            <label>Content *</label>
            <textarea [(ngModel)]="form.content" rows="16" placeholder="Write your full blog post content here. You can use HTML tags for formatting."></textarea>
            <small>Tip: You can use HTML tags like &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;, &lt;strong&gt; etc.</small>
          </div>
        </div>
      </div>

      <!-- Sidebar settings -->
      <div class="edit-sidebar">
        <div class="form-card">
          <h3>Publish Settings</h3>
          <div class="toggle-row">
            <label>Published</label>
            <label class="toggle">
              <input type="checkbox" [(ngModel)]="form.published" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <label>Featured</label>
            <label class="toggle">
              <input type="checkbox" [(ngModel)]="form.featured" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="form-card">
          <h3>Post Details</h3>
          <div class="form-group">
            <label>Category</label>
            <select [(ngModel)]="form.category">
              <option value="">Select category</option>
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label>Author</label>
            <input [(ngModel)]="form.author" />
          </div>
          <div class="form-group">
            <label>Tags (comma separated)</label>
            <input [(ngModel)]="form.tags" placeholder="cloud, aws, migration" />
          </div>
          <div class="form-group">
            <label>Read Time</label>
            <input [(ngModel)]="form.readTime" placeholder="5 min read" />
          </div>
          <div class="form-group">
            <label>Cover Image URL</label>
            <input [(ngModel)]="form.coverImage" placeholder="https://..." />
          </div>
        </div>

        <button class="btn-save" (click)="save()" [disabled]="saving()">
          {{ saving() ? 'Saving...' : (isEdit ? 'Update Post' : 'Create Post') }}
        </button>
      </div>
    </div>
  }
</div>
