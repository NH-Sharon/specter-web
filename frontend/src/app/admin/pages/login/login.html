<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <app-logo theme="light" size="lg"></app-logo>
    </div>
    <p class="login-tagline">Sign in to manage your website content</p>

    @if (error()) {
      <div class="login-error">{{ error() }}</div>
    }

    <form (ngSubmit)="login()" #f="ngForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button type="submit" class="login-btn" [disabled]="loading()">
        @if (loading()) { Signing in... } @else { Sign In }
      </button>
    </form>

    <a routerLink="/" class="back-link">← Back to Website</a>
  </div>
</div>
