<div class="settings-page">
  <div class="page-header">
    <h1>Settings</h1>
    <p>Manage general site configuration and company information</p>
  </div>

  @if (saved()) {
    <div class="alert-success">Settings saved successfully!</div>
  }

  <div class="settings-grid">
    <div class="settings-card">
      <h2>Company Information</h2>
      <div class="form-group">
        <label>Company Name</label>
        <input [(ngModel)]="settings.companyName" placeholder="Company name..." />
      </div>
      <div class="form-group">
        <label>Tagline</label>
        <input [(ngModel)]="settings.tagline" placeholder="Company tagline..." />
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" [(ngModel)]="settings.email" placeholder="hello@example.com" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input [(ngModel)]="settings.phone" placeholder="+880 ..." />
      </div>
      <div class="form-group">
        <label>Office Address</label>
        <textarea [(ngModel)]="settings.address" rows="3" placeholder="Full office address..."></textarea>
      </div>
    </div>

    <div class="settings-card">
      <h2>Social Media Links</h2>
      <div class="form-group">
        <label>LinkedIn URL</label>
        <input [(ngModel)]="settings.linkedIn" placeholder="https://linkedin.com/company/..." />
      </div>
      <div class="form-group">
        <label>GitHub URL</label>
        <input [(ngModel)]="settings.github" placeholder="https://github.com/..." />
      </div>
      <div class="form-group">
        <label>Twitter / X URL</label>
        <input [(ngModel)]="settings.twitter" placeholder="https://twitter.com/..." />
      </div>
      <div class="form-group">
        <label>Facebook URL</label>
        <input [(ngModel)]="settings.facebook" placeholder="https://facebook.com/..." />
      </div>
    </div>

    <div class="settings-card">
      <h2>Analytics & Tracking</h2>
      <div class="form-group">
        <label>Google Analytics ID</label>
        <input [(ngModel)]="settings.googleAnalytics" placeholder="G-XXXXXXXXXX" />
        <small>Enter your Google Analytics Measurement ID</small>
      </div>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn-save" (click)="save()">Save Settings</button>
  </div>
</div>
