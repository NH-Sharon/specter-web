version: '3.9'

# ──────────────────────────────────────────────────
# Specter Technologies — Docker Compose
# Full stack: Angular + Spring Boot + PostgreSQL + NGINX
# ──────────────────────────────────────────────────

services:

  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: specter_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-specterdb}
      POSTGRES_USER: ${POSTGRES_USER:-specter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-specterpass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - specter_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-specter} -d ${POSTGRES_DB:-specterdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: specter_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-specterdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-specter}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-specterpass}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      JWT_SECRET: ${JWT_SECRET:-specter-jwt-secret-key-change-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,https://spectertech.com}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - specter_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Angular Frontend + NGINX ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specter_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - specter_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  specter_network:
    driver: bridge
