# ──────────────────────────────────────────────────────────────────────────────
# Specter Technologies — GitLab CI/CD Pipeline
# Stages: lint → test → build → security → deploy
# ──────────────────────────────────────────────────────────────────────────────

image: node:20-alpine

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: $CI_REGISTRY
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend
  IMAGE_BACKEND:  $CI_REGISTRY_IMAGE/backend
  NODE_ENV: production

stages:
  - lint
  - test
  - build
  - security
  - staging
  - production

# ─── Shared Caches ───────────────────────────────────────────────────────────
.frontend_cache: &frontend_cache
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
    policy: pull

.maven_cache: &maven_cache
  cache:
    key:
      files:
        - backend/pom.xml
    paths:
      - backend/.m2/
    policy: pull

# ─────────────────────────────────────────────────────────────────────────────
# LINT STAGE
# ─────────────────────────────────────────────────────────────────────────────

lint:frontend:
  stage: lint
  <<: *frontend_cache
  before_script:
    - cd frontend
    - npm ci --legacy-peer-deps
  script:
    - npm run lint 2>/dev/null || echo "No lint script configured yet"
  allow_failure: true
  rules:
    - changes:
        - frontend/**/*

lint:backend:
  stage: lint
  image: maven:3.9-eclipse-temurin-21-alpine
  <<: *maven_cache
  before_script:
    - cd backend
  script:
    - mvn checkstyle:check -q 2>/dev/null || echo "No checkstyle configured yet"
  allow_failure: true
  rules:
    - changes:
        - backend/**/*

# ─────────────────────────────────────────────────────────────────────────────
# TEST STAGE
# ─────────────────────────────────────────────────────────────────────────────

test:frontend:
  stage: test
  <<: *frontend_cache
  before_script:
    - cd frontend
    - npm ci --legacy-peer-deps
  script:
    - npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage 2>/dev/null || echo "Tests not configured yet"
  coverage: '/Statements\s*:\s*([^%]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
  allow_failure: true
  rules:
    - changes:
        - frontend/**/*

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21-alpine
  <<: *maven_cache
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: test
    POSTGRES_PASSWORD: testpass
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
    SPRING_DATASOURCE_USERNAME: test
    SPRING_DATASOURCE_PASSWORD: testpass
  before_script:
    - cd backend
  script:
    - mvn test -Dspring.profiles.active=test 2>/dev/null || echo "Tests not configured yet"
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
  allow_failure: true
  rules:
    - changes:
        - backend/**/*

# ─────────────────────────────────────────────────────────────────────────────
# BUILD STAGE
# ─────────────────────────────────────────────────────────────────────────────

build:frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  <<: *frontend_cache
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        --build-arg VCS_REF=$CI_COMMIT_SHA
        --build-arg VERSION=$CI_COMMIT_TAG
        -t $IMAGE_FRONTEND:$CI_COMMIT_SHA
        -t $IMAGE_FRONTEND:latest
        -f frontend/Dockerfile
        .
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHA
    - docker push $IMAGE_FRONTEND:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_TAG'

build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build
        --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        --build-arg VCS_REF=$CI_COMMIT_SHA
        -t $IMAGE_BACKEND:$CI_COMMIT_SHA
        -t $IMAGE_BACKEND:latest
        -f backend/Dockerfile
        backend/
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHA
    - docker push $IMAGE_BACKEND:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_TAG'

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY STAGE
# ─────────────────────────────────────────────────────────────────────────────

security:container-scan:
  stage: security
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format template --template "@/contrib/gitlab.tpl" -o gl-container-scanning-report.json $IMAGE_FRONTEND:$CI_COMMIT_SHA
    - trivy image --exit-code 0 --severity HIGH,CRITICAL $IMAGE_BACKEND:$CI_COMMIT_SHA
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'

security:sast:
  stage: security
  image: maven:3.9-eclipse-temurin-21-alpine
  script:
    - cd backend
    - mvn dependency-check:check -DfailBuildOnCVSS=9 2>/dev/null || echo "OWASP check not configured"
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGING DEPLOY
# ─────────────────────────────────────────────────────────────────────────────

deploy:staging:
  stage: staging
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.spectertech.com
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_USER@$STAGING_HOST "
        cd /opt/specter &&
        docker-compose pull &&
        docker-compose up -d --remove-orphans &&
        docker system prune -f
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION DEPLOY
# ─────────────────────────────────────────────────────────────────────────────

deploy:production:
  stage: production
  image: alpine:latest
  environment:
    name: production
    url: https://spectertech.com
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $PROD_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_USER@$PROD_HOST "
        cd /opt/specter &&
        docker pull $IMAGE_FRONTEND:$CI_COMMIT_SHA &&
        docker pull $IMAGE_BACKEND:$CI_COMMIT_SHA &&
        export IMAGE_TAG=$CI_COMMIT_SHA &&
        docker-compose up -d --remove-orphans &&
        docker system prune -f
      "
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual
  needs:
    - build:frontend
    - build:backend
    - security:container-scan
